<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RadioDash Options</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        max-width: 480px;
        color: #333;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-bottom: 16px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      button {
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #999;
        background: #f0f0f0;
      }

      button:hover {
        background: #e0e0e0;
      }

      #status {
        margin-top: 12px;
        color: #555;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>RadioDash Options</h1>

    <label for="server-url">Server URL</label>
    <input
      type="text"
      id="server-url"
      placeholder="https://your-project.vercel.app"
    />

    <label for="api-token">API Token</label>
    <input type="password" id="api-token" placeholder="your-api-token" />

    <button id="save-btn">Save</button>
    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
