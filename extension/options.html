<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RadioDash Settings</title>
    <style>
      :root {
        --ink: #24313d;
        --muted: #687786;
        --line: #d9e1e8;
        --surface: #ffffff;
        --surface-soft: #f6f8fa;
        --accent: #2f5f8f;
        --danger: #a43d3d;
        --danger-hover: #8f3131;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 360px;
        color: var(--ink);
        background: var(--surface);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        padding: 18px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 18px;
        line-height: 1.25;
      }

      .setting-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 18px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-soft);
      }

      .setting-row + .setting-row {
        margin-top: 10px;
      }

      .setting-title {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.3;
      }

      .setting-description,
      .status {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .setting-description {
        margin-top: 3px;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }

      .switch input {
        width: 1px;
        height: 1px;
        opacity: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: #b8c4cf;
        cursor: pointer;
        transition: background-color 0.16s ease;
      }

      .slider::before {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 2px rgba(30, 42, 54, 0.24);
        content: "";
        transition: transform 0.16s ease;
      }

      .switch input:checked + .slider {
        background: var(--accent);
      }

      .switch input:checked + .slider::before {
        transform: translateX(20px);
      }

      .switch input:focus-visible + .slider {
        outline: 2px solid #8cb7de;
        outline-offset: 2px;
      }

      button {
        min-width: 110px;
        border: 0;
        border-radius: 6px;
        padding: 8px 12px;
        color: #fff;
        background: var(--danger);
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover:not([disabled]) {
        background: var(--danger-hover);
      }

      button:active:not([disabled]) {
        transform: translateY(1px);
      }

      button:focus-visible {
        outline: 2px solid #d88d8d;
        outline-offset: 2px;
      }

      button[disabled] {
        cursor: default;
        opacity: 0.65;
      }

      .status {
        min-height: 16px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RadioDash Settings</h1>
      <div class="setting-row">
        <div>
          <div class="setting-title">Auto-prepare case files</div>
          <div class="setting-description">
            Automatically start Prepare when a radiology case page opens.
          </div>
        </div>
        <label class="switch" title="Auto-prepare case files">
          <input
            id="auto-prepare-toggle"
            type="checkbox"
            role="switch"
            aria-label="Auto-prepare case files"
          />
          <span class="slider" aria-hidden="true"></span>
        </label>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-title">Download agent temp directory</div>
          <div class="setting-description">
            Delete the managed temp directory used for prepared case files.
          </div>
        </div>
        <button id="delete-temp-button" type="button">Delete temp</button>
      </div>
      <div id="settings-status" class="status" aria-live="polite"></div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
