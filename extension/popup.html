<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        min-width: 320px;
        color: #25313b;
      }

      .section-title {
        margin: 0;
        padding: 10px;
        background: #25313b;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }

      #template-buttons,
      #download-agent-files {
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      #template-buttons button {
        width: 100%;
        height: 40px;
        margin: 0;
        border: none;
        background-color: #f0f0f0;
        color: #333;
        cursor: pointer;
        font-size: 16px;
        text-align: left;
        padding-left: 10px;
        line-height: 40px;
        transition: background-color 0.3s;
        border-bottom: 1px solid #ccc;
      }

      #template-buttons button:hover {
        background-color: #e0f7fa;
      }

      #template-buttons button:active {
        background-color: #b2ebf2;
      }

      #template-buttons button:last-child {
        border-bottom: none;
      }

      .download-agent-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid #d9e1e8;
        background: #f8fafc;
      }

      .download-agent-status {
        color: #607080;
        font-size: 12px;
      }

      .small-button {
        border: 1px solid #b8c5d0;
        background: #fff;
        color: #25313b;
        cursor: pointer;
        font-size: 12px;
        min-height: 28px;
        padding: 0 10px;
      }

      .download-agent-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 88px;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid #d9e1e8;
      }

      .download-agent-file-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
      }

      .download-agent-error {
        color: #a63737;
        font-size: 11px;
        margin-top: 3px;
        white-space: normal;
      }

      .download-agent-row button {
        border: 1px solid #97a8b6;
        background: #fff;
        color: #25313b;
        cursor: pointer;
        font-size: 12px;
        height: 30px;
      }

      .download-agent-row button[disabled] {
        cursor: default;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <h2 class="section-title">Templates</h2>
    <div id="template-buttons"></div>
    <h2 class="section-title">Download Agent</h2>
    <div class="download-agent-toolbar">
      <span id="download-agent-status" class="download-agent-status"
        >Loading</span
      >
      <button id="download-agent-refresh" class="small-button">Refresh</button>
    </div>
    <div id="download-agent-files"></div>
    <script src="popup.js"></script>
  </body>
</html>
