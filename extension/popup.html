<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        min-width: 150px;
      }

      #template-buttons {
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      #template-buttons button {
        width: 100%;
        height: 40px;
        margin: 0;
        border: none;
        background-color: #f0f0f0;
        color: #333;
        cursor: pointer;
        font-size: 16px;
        text-align: left;
        padding-left: 10px;
        line-height: 40px;
        transition: background-color 0.3s;
        border-bottom: 1px solid #ccc;
      }

      #template-buttons button:hover {
        background-color: #e0f7fa;
      }

      #template-buttons button:active {
        background-color: #b2ebf2;
      }

      #template-buttons button:last-child {
        border-bottom: none;
      }
    </style>
  </head>
  <body>
    <div id="template-buttons"></div>
    <script src="popup.js"></script>
  </body>
</html>
