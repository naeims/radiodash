<!doctype html>
<html>
  <head>
    <style>
      :root {
        --ink: #24313d;
        --muted: #687786;
        --line: #d9e1e8;
        --surface: #ffffff;
        --surface-soft: #f6f8fa;
        --prepare: #2f5f8f;
        --prepare-hover: #264f78;
        --view: #21705f;
        --view-hover: #1a5d50;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        min-width: 340px;
        color: var(--ink);
        background: var(--surface);
      }

      .section-title {
        margin: 0;
        padding: 10px 12px;
        background: #26323d;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 9px 10px 9px 12px;
        background: #26323d;
        color: #fff;
      }

      .section-header .section-title {
        padding: 0;
        background: transparent;
      }

      .section-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #template-buttons,
      #download-agent-files {
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      #template-buttons button {
        width: 100%;
        min-height: 42px;
        margin: 0;
        border: none;
        background-color: var(--surface);
        color: var(--ink);
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        text-align: left;
        padding: 10px 12px;
        line-height: 1.3;
        transition:
          background-color 0.16s ease,
          color 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.08s ease;
        border-bottom: 1px solid var(--line);
      }

      #template-buttons button:hover {
        background-color: #eef4f7;
      }

      #template-buttons button:active {
        background-color: #e2ebef;
        transform: translateY(1px);
      }

      #template-buttons button:last-child {
        border-bottom: none;
      }

      .download-agent-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
        background: var(--surface-soft);
      }

      .download-agent-status {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .small-button {
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.06);
        color: #dce4ea;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        min-height: 28px;
        padding: 0 8px;
        transition:
          background-color 0.16s ease,
          border-color 0.16s ease,
          color 0.16s ease,
          transform 0.08s ease;
      }

      .small-button:hover {
        border-color: rgba(255, 255, 255, 0.42);
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }

      .small-button:active {
        transform: translateY(1px);
        background: rgba(255, 255, 255, 0.18);
      }

      .download-agent-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 96px;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        padding: 9px 10px 9px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .download-agent-file-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
      }

      .download-agent-error {
        color: #a63737;
        font-size: 11px;
        margin-top: 3px;
        white-space: normal;
      }

      .download-agent-row button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 1px solid transparent;
        border-radius: 5px;
        background: var(--prepare);
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        height: 32px;
        padding: 0 10px;
        transition:
          background-color 0.16s ease,
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.08s ease;
      }

      .download-agent-row button:hover:not([disabled]) {
        background: var(--prepare-hover);
        box-shadow: 0 1px 3px rgba(30, 42, 54, 0.2);
      }

      .download-agent-row button:active:not([disabled]) {
        transform: translateY(1px);
        box-shadow: none;
      }

      .download-agent-row button.action-view {
        background: var(--view);
      }

      .download-agent-row button.action-view:hover:not([disabled]) {
        background: var(--view-hover);
      }

      .download-agent-row button.action-retry {
        background: #6c5a35;
      }

      .download-agent-row button.action-retry:hover:not([disabled]) {
        background: #594a2d;
      }

      .download-agent-row button[disabled] {
        cursor: default;
        border-color: #cfd8df;
        background: #edf1f4;
        color: #687786;
        opacity: 1;
      }

      .loading-spinner {
        width: 13px;
        height: 13px;
        border: 2px solid #c7d2dc;
        border-top-color: #607080;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <h2 class="section-title">Templates</h2>
    <div id="template-buttons"></div>
    <div class="section-header">
      <h2 class="section-title">Download Agent</h2>
      <div class="section-actions">
        <button id="download-agent-settings" class="small-button">
          Settings
        </button>
        <button id="download-agent-refresh" class="small-button">
          Refresh
        </button>
      </div>
    </div>
    <div class="download-agent-toolbar">
      <span id="download-agent-status" class="download-agent-status"
        >Loading</span
      >
    </div>
    <div id="download-agent-files"></div>
    <script src="popup.js"></script>
  </body>
</html>
